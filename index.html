<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy AI - Emergency 30-Day Crash Course Planner</title>
    <style>
        :root {
            --primary-color: #e74c3c; /* 긴급 상황을 나타내는 Red 계열로 변경 */
            --secondary-color: #f5f7fa;
            --text-color: #333333;
            --accent-color: #2ecc71;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }

        h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
            margin-top: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fafafa;
        }

        input[readonly] {
            background-color: #e9ecef;
            cursor: not-allowed;
        }

        button {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #c0392b;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            background-color: var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
        }

        .dashboard-item {
            text-align: center;
            flex: 1;
        }

        .dashboard-item .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .progress-bar-container {
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: var(--secondary-color);
            color: var(--text-color);
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .checkbox-cell {
            text-align: center;
            width: 50px;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
        }

        .completed-text {
            text-decoration: line-through;
            color: #888888;
            opacity: 0.6;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            margin-right: 5px;
        }
        .badge-danger { background-color: #e74c3c; }
        .badge-theory { background-color: #e67e22; }
        .badge-code { background-color: #2980b9; }
        .badge-review { background-color: #16a085; }
    </style>
</head>
<body>

<div class="container">
    <h1>SmartStudy AI: 30-Day Crash Course</h1>
    
    <div id="planner-form">
        <div class="form-group">
            <label for="exam-name">Target Exam Name</label>
            <input type="text" id="exam-name" value="AP Computer Science A" readonly>
        </div>
        
        <div class="form-group">
            <label for="exam-date">Set Exam Date (Set to 30 days from now for testing)</label>
            <input type="date" id="exam-date">
        </div>
        
        <div class="form-group">
            <label for="weak-topics">Current Status</label>
            <input type="text" id="weak-topics" value="Zero-Base / Absolute Beginner (All Units Needed)" readonly>
        </div>
        
        <div class="form-group">
            <label for="study-hours">Daily Intensive Study Time (Fixed)</label>
            <input type="text" id="study-hours" value="3 Hours / Day" readonly>
        </div>
        
        <button type="button" onclick="generateEmergencyPlan()">Generate 30-Day Emergency Roadmap</button>
    </div>

    <div id="result-section" class="result-section">
        <h2>🚨 Emergency Learning Dashboard</h2>
        
        <div class="dashboard">
            <div class="dashboard-item">
                <div>Status Alert</div>
                <div class="value" style="font-size: 1.1rem; margin-top: 5px;"><span class="badge badge-danger">CRASH COURSE ACTIVE</span></div>
            </div>
            <div class="dashboard-item">
                <div>Time Remaining</div>
                <div id="d-day-val" class="value">D-30</div>
            </div>
            <div class="dashboard-item">
                <div>Milestones Met</div>
                <div id="progress-val" class="value">0%</div>
            </div>
        </div>

        <label>Overall 30-Day Completion</label>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <h2>30-Day Day-by-Day Micro-Tasks (No Gaps)</h2>
        <table id="schedule-table">
            <thead>
                <tr>
                    <th class="checkbox-cell">Done</th>
                    <th style="width: 100px;">Timeline</th>
                    <th>Intensive Curriculum Breakdown (3 Hours Daily)</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 페이지 로드 시 자동으로 오늘 기준 30일 뒤를 기본 날짜로 세팅해 주는 편의 기능
    window.onload = function() {
        const defaultDate = new Date();
        defaultDate.setDate(defaultDate.getDate() + 30);
        document.getElementById('exam-date').value = defaultDate.toISOString().split('T')[0];
    }

    function generateEmergencyPlan() {
        const examDateInput = document.getElementById('exam-date').value;
        if (!examDateInput) {
            alert('Please select an exam date!');
            return;
        }

        const today = new Date();
        const examDate = new Date(examDateInput);
        const timeDiff = examDate.getTime() - today.getTime();
        const dDay = Math.ceil(timeDiff / (1000 * 3600 * 24));
        
        document.getElementById('d-day-val').innerText = `D-${dDay}`;

        const scheduleBody = document.getElementById('schedule-body');
        scheduleBody.innerHTML = ""; // 초기화

        // 30일 노베이스 탈출 최적화 커리큘럼 데이터 배열 (총 30개 항목)
        const emergencyCurriculum = [
            { type: '<span class="badge badge-theory">Theory</span>', task: "Unit 1: Primitive Types & Variables. Study int, double, boolean and casting fundamentals." },
            { type: '<span class="badge badge-code">Coding</span>', task: "Unit 1 Practice: Write basic arithmetic expressions and trace system outputs." },
            { type: '<span class="badge badge-theory">Theory</span>', task: "Unit 2: Using Objects. Understand String methods, Math class, and Wrapper classes." },
            { type: '<span class="badge badge-code">Coding</span>', task: "Unit 2 Practice: Instantiating objects and calling methods with parameters." },
            { type: '<span class="badge badge-theory">Theory</span>', task: "Unit 3: Boolean Expressions & If Statements. Conditional logic and De Morgan's Laws." },
            { type: '<span class="badge badge-code">Coding</span>', task: "Unit 3 Practice: Write nested if-else structures and truth table check logs." },
            { type: '<span class="badge badge-theory">Theory</span>', task: "Unit 4: Iteration. Mastering for loops, while loops, and string loops." },
            { type: '<span class="badge badge-code">Coding</span>', task: "Unit 4 Practice: Code nested loops to print patterns and trace loop iterations." },
            { type: '<span class="badge badge-theory">Theory</span>', task: "Unit 5: Writing Classes. Understanding constructors, encapsulation, and documentation." },
            { type: '<span class="badge badge-code">Coding</span>', task: "Unit 5 Practice: Design a custom class from scratch with private variables and public methods." },
            
            { type: '<span class="badge badge-theory">Theory</span>', task: "Unit 6: Arrays. 1D Array creation, indexing, and traversal algorithms." },
            { type: '<span class="badge badge-code">Coding</span>', task: "Unit 6 Practice: Code basic array algorithms (finding min/max, calculating averages)." },
            { type: '<span class="badge badge-theory">Theory</span>', task: "Unit 7: ArrayList. Understanding dynamic lists, methods (add, remove, set), and bounds." },
            { type: '<span class="badge badge-code">Coding</span>', task: "Unit 7 Practice: Write loops to modify ArrayLists safely without concurrent errors." },
            { type: '<span class="badge badge-theory">Theory</span>', task: "Unit 8: 2D Arrays. Row-major vs Column-major order tracking structures." },
            { type: '<span class="badge badge-code">Coding</span>', task: "Unit 8 Practice: Traverse 2D arrays using nested loops to search or filter values." },
            { type: '<span class="badge badge-theory">Theory</span>', task: "Unit 9: Inheritance. Superclasses, subclasses, polymorphism, and method overriding." },
            { type: '<span class="badge badge-code">Coding</span>', task: "Unit 9 Practice: Build inheritance hierarchies and test polymorphic method behaviors." },
            { type: '<span class="badge badge-theory">Theory</span>', task: "Unit 10: Recursion. Base cases, recursive calls, and tracing recursion trees." },
            { type: '<span class="badge badge-code">Coding</span>', task: "Unit 10 Practice: Manually trace recursive code blocks and identify stack overflow bugs." },
            
            { type: '<span class="badge badge-review">FRQ Core</span>', task: "FRQ Strategy Day 1: Methods and Control Structures (Focusing on Unit 1-4 elements)." },
            { type: '<span class="badge badge-review">FRQ Core</span>', task: "FRQ Strategy Day 2: Class Design requirements. Write comprehensive structures on paper." },
            { type: '<span class="badge badge-review">FRQ Core</span>', task: "FRQ Strategy Day 3: Array/ArrayList manipulation routines (The highest scoring criteria)." },
            { type: '<span class="badge badge-review">FRQ Core</span>', task: "FRQ Strategy Day 4: 2D Array grids traversal techniques and boundary setups." },
            { type: '<span class="badge badge-review">Mock Exam</span>', task: "Full Diagnostic Mock Test 1: Real-time mock session under strict limits." },
            { type: '<span class="badge badge-review">Review</span>', task: "Deconstruct Mock Test 1: Log mistakes, isolate logic gaps, re-read concepts." },
            { type: '<span class="badge badge-review">Mock Exam</span>', task: "Full Diagnostic Mock Test 2: Apply fixes to elevate scoring trends." },
            { type: '<span class="badge badge-review">Review</span>', task: "Deconstruct Mock Test 2: Double check AP Java Quick Reference sheets definitions." },
            { type: '<span class="badge badge-danger">Final Check</span>', task: "Review unified personal error log records and review critical default keywords." },
            { type: '<span class="badge badge-danger">Exam Day</span>', task: "Final Mind Control. Trust the 30 days of consistent 3-hour daily execution." }
        ];

        // 1일부터 30일까지 빈틈없이 테이블 행 생성 알고리즘
        for (let i = 0; i < 30; i++) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="checkbox-cell"><input type="checkbox" onchange="updateProgress()" id="check-${i}"></td>
                <td><strong>Day ${i + 1}</strong></td>
                <td id="text-${i}">${emergencyCurriculum[i].type} ${emergencyCurriculum[i].task}</td>
            `;
            scheduleBody.appendChild(row);
        }

        document.getElementById('result-section').style.display = 'block';
        updateProgress();
    }

    function updateProgress() {
        const checkboxes = document.querySelectorAll('#schedule-body input[type="checkbox"]');
        if (checkboxes.length === 0) return;

        let checkedCount = 0;
        checkboxes.forEach((cb, index) => {
            const textCell = document.getElementById(`text-${index}`);
            if (cb.checked) {
                checkedCount++;
                textCell.classList.add('completed-text');
            } else {
                textCell.classList.remove('completed-text');
            }
        });

        const percentage = Math.round((checkedCount / checkboxes.length) * 100);
        
        document.getElementById('progress-val').innerText = `${checkedCount} / ${checkboxes.length} (${percentage}%)`;
        document.getElementById('progress-bar').style.width = `${percentage}%`;
    }
</script>

</body>
</html>
