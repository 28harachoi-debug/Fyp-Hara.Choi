<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartStudy AI — Intelligent Study Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1eb;
    --surface: #ffffff;
    --surface2: #f9f7f3;
    --border: #e2ddd6;
    --text: #1a1714;
    --text2: #6b6560;
    --accent: #c8451a;
    --accent2: #2a6b4f;
    --accent3: #1e4a8c;
    --accent-soft: #fde8e1;
    --shadow: 0 2px 16px rgba(26,23,20,0.08);
    --radius: 12px;
    --transition: 0.22s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="dark"] {
    --bg: #141210;
    --surface: #1e1c1a;
    --surface2: #252220;
    --border: #333028;
    --text: #f0ece4;
    --text2: #948e86;
    --accent: #e05a30;
    --accent-soft: #3a1a10;
    --shadow: 0 2px 16px rgba(0,0,0,0.4);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; letter-spacing: -0.03em; color: var(--text); }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .icon-btn {
    width: 38px; height: 38px;
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    transition: all var(--transition);
    color: var(--text);
  }
  .icon-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
  .main { max-width: 860px; margin: 0 auto; padding: 36px 24px 80px; }
  .hero { text-align: center; margin-bottom: 40px; animation: fadeUp .5s ease both; }
  .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 10px; }
  .hero h1 em { color: var(--accent); font-style: normal; }
  .hero p { color: var(--text2); font-size: 1.05rem; font-weight: 300; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    animation: fadeUp .5s ease both;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .form-group { display: flex; flex-direction: column; gap: 7px; }
  .form-group.full { grid-column: 1/-1; }
  label { font-size: .85rem; font-weight: 500; color: var(--text2); }
  select, input[type="date"], input[type="number"] {
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    transition: border-color var(--transition), box-shadow var(--transition);
    outline: none;
  }
  select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .btn-row { display: flex; gap: 12px; margin-top: 8px; }
  .btn { padding: 13px 22px; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; cursor: pointer; transition: all var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { flex: 1; background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text2); }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
  .loading .spinner { display: block; }
  .loading .btn-label { display: none; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; text-align: center; box-shadow: var(--shadow); }
  .stat-label { font-size: .78rem; color: var(--text2); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--accent); }
  .stat-value.green { color: var(--accent2); }
  .progress-wrap { margin-bottom: 28px; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: .85rem; color: var(--text2); }
  .progress-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #2a6b4f, #42b883); border-radius: 99px; width: 0%; transition: width .5s ease; }
  .view-toggle { display: flex; gap: 6px; margin-bottom: 18px; }
  .view-btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text2); font-size: .85rem; font-weight: 500; cursor: pointer; transition: all var(--transition); }
  .view-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .schedule-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  .schedule-table th { background: var(--surface2); border-bottom: 2px solid var(--border); padding: 11px 14px; text-align: left; font-size: .78rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text2); }
  .schedule-table td { border-bottom: 1px solid var(--border); padding: 12px 14px; vertical-align: top; transition: background var(--transition); }
  .schedule-table tr:hover td { background: var(--surface2); }
  .schedule-table tr.done td { opacity: .5; }
  .schedule-table tr.done .task-text { text-decoration: line-through; }
  .day-label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; }
  .date-sub { font-size: .78rem; color: var(--text2); margin-top: 2px; }
  .tag { display: inline-block; padding: 3px 9px; border-radius: 5px; font-size: .75rem; font-weight: 600; margin-right: 6px; white-space: nowrap; }
  .tag-concept { background: #fff3cd; color: #856404; }
  .tag-practice { background: #d4edda; color: #155724; }
  .tag-exam { background: #cce5ff; color: #004085; }
  .tag-review { background: #e2d9f3; color: #432874; }
  .tag-rest { background: #e2e3e5; color: #383d41; }
  [data-theme="dark"] .tag-concept { background: #3d2e00; color: #f0b840; }
  [data-theme="dark"] .tag-practice { background: #1a3d25; color: #6ed08a; }
  [data-theme="dark"] .tag-exam { background: #0a2a40; color: #60b0f0; }
  [data-theme="dark"] .tag-review { background: #2a1a40; color: #c0a0f0; }
  [data-theme="dark"] .tag-rest { background: #2a2a2a; color: #aaa; }
  .diff-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .diff-easy .diff-dot { background: #28a745; }
  .diff-medium .diff-dot { background: #ffc107; }
  .diff-hard .diff-dot { background: #dc3545; }
  .note-input { width: 100%; padding: 6px 10px; border: 1px solid transparent; border-radius: 6px; background: transparent; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: .82rem; resize: none; outline: none; margin-top: 5px; transition: all var(--transition); min-height: 28px; }
  .note-input:focus { border-color: var(--border); background: var(--bg); color: var(--text); }
  .note-input::placeholder { color: var(--text2); opacity: .6; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 8px; }
  .week-day-header { text-align: center; font-size: .72rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; padding: 6px 0; }
  .week-cell { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 8px; min-height: 90px; cursor: pointer; transition: all var(--transition); font-size: .78rem; position: relative; }
  .week-cell:hover { border-color: var(--accent); }
  .week-cell.done-cell { opacity: .55; }
  .week-cell .cell-day { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .9rem; margin-bottom: 4px; }
  .week-cell .cell-tag { font-size: .7rem; font-weight: 600; color: var(--accent); }
  .week-cell .cell-snippet { color: var(--text2); margin-top: 4px; line-height: 1.3; font-size: .73rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .week-check { position: absolute; top: 7px; right: 8px; font-size: .85rem; }
  .week-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .week-nav span { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; flex: 1; text-align: center; }
  #ai-status { font-size: .85rem; color: var(--text2); min-height: 22px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .blink { animation: blink 1s steps(2) infinite; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 50% { opacity: 0; } }
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .week-grid { grid-template-columns: repeat(4, 1fr); }
    .header { padding: 16px 18px; }
    .main { padding: 24px 14px 60px; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">Smart<span>Study</span> AI</div>
  <div class="header-actions">
    <button class="icon-btn" id="theme-btn" title="Toggle dark mode" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn" title="Export TXT" onclick="exportTxt()">💾</button>
  </div>
</header>

<main class="main">
  <div class="hero">
    <h1>Your <em>AI-Powered</em><br>Study Roadmap</h1>
    <p>Personalized day-by-day plans, generated by Claude AI</p>
  </div>

  <div class="card">
    <div class="card-title">Configure Your Plan</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Subject</label>
        <select id="subject">
          <optgroup label="Middle School (G7–G8)">
            <option value="G7/G8 English">English</option>
            <option value="G7/G8 Math">Math</option>
            <option value="G7/G8 Science">Science</option>
            <option value="G7/G8 Social Studies">Social Studies</option>
            <option value="G7/G8 World Language">World Language</option>
          </optgroup>
          <optgroup label="High School (G9–G12)">
            <option value="Algebra 1 & 2">Algebra 1 & 2</option>
            <option value="Biology">Biology</option>
            <option value="Business">Business</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Chinese">Chinese</option>
            <option value="AP Computer Science">AP Computer Science</option>
            <option value="Economics">Economics</option>
            <option value="English">English</option>
            <option value="Environmental Science">Environmental Science</option>
            <option value="Geometry">Geometry</option>
            <option value="AP Human Geography">AP Human Geography</option>
            <option value="AP Macroeconomics">AP Macroeconomics</option>
            <option value="AP Microeconomics">AP Microeconomics</option>
            <option value="Physics">Physics</option>
            <option value="AP Calculus / Precalculus">AP Calculus / Precalculus</option>
            <option value="AP Psychology">AP Psychology</option>
            <option value="Spanish">Spanish</option>
            <option value="AP Statistics">AP Statistics</option>
            <option value="AP World History">AP World History</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group">
        <label>Exam Date</label>
        <input type="date" id="exam-date">
      </div>
      <div class="form-group">
        <label>Starting Level</label>
        <select id="level">
          <option value="zero">Beginner — Need full concept coverage</option>
          <option value="intermediate">Intermediate — Know basics, need practice</option>
          <option value="advanced">Advanced — Intensive drilling & mock exams</option>
        </select>
      </div>
      <div class="form-group">
        <label>Daily Study Hours</label>
        <input type="number" id="hours" min="1" max="12" value="3">
      </div>
      <div class="form-group full">
        <div class="btn-row">
          <button class="btn btn-primary" id="gen-btn" onclick="generatePlan()">
            <div class="spinner"></div>
            <span class="btn-label">✦ Generate AI Roadmap</span>
          </button>
          <button class="btn btn-secondary" onclick="clearPlan()">✕ Clear</button>
        </div>
      </div>
    </div>
  </div>

  <div id="result" style="display:none">
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Subject</div>
        <div class="stat-value" id="stat-subject" style="font-size:1rem">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Days Left</div>
        <div class="stat-value" id="stat-days">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Completed</div>
        <div class="stat-value green" id="stat-pct">0%</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-header">
        <span>Overall Progress</span>
        <span id="prog-label">0 / 0 tasks</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="card" style="animation-delay:.1s">
      <div class="card-title">Study Schedule</div>
      <div id="ai-status"></div>
      <div class="view-toggle">
        <button class="view-btn active" onclick="switchView('list', this)">☰ Daily List</button>
        <button class="view-btn" onclick="switchView('week', this)">⊞ Weekly Grid</button>
      </div>

      <div id="list-view">
        <table class="schedule-table">
          <thead>
            <tr>
              <th style="width:40px">✓</th>
              <th style="width:110px">Day</th>
              <th>Today's Task</th>
              <th style="width:80px">Difficulty</th>
            </tr>
          </thead>
          <tbody id="schedule-body"></tbody>
        </table>
      </div>

      <div id="week-view" style="display:none">
        <div class="week-nav">
          <button class="icon-btn" onclick="weekNav(-1)">‹</button>
          <span id="week-label">Week 1</span>
          <button class="icon-btn" onclick="weekNav(1)">›</button>
        </div>
        <div class="week-grid" id="week-headers"></div>
        <div class="week-grid" id="week-cells"></div>
      </div>
    </div>
  </div>
</main>

<script>
let planData = [];
let currentView = 'list';
let currentWeek = 0;
const STORAGE_KEY = 'smartstudy_plan_v2';

window.onload = () => {
  const d = new Date();
  d.setDate(d.getDate() + 30);
  document.getElementById('exam-date').value = d.toISOString().split('T')[0];
  applyTheme(localStorage.getItem('ss_theme') || 'light');
  loadFromStorage();
};

function toggleTheme() {
  const cur = document.documentElement.dataset.theme;
  const next = cur === 'dark' ? 'light' : 'dark';
  applyTheme(next);
}
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  document.getElementById('theme-btn').textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('ss_theme', t);
}

async function generatePlan() {
  const subject = document.getElementById('subject').value;
  const examDateVal = document.getElementById('exam-date').value;
  const level = document.getElementById('level').value;
  const hours = parseInt(document.getElementById('hours').value) || 3;

  if (!examDateVal) { alert('Please select an exam date.'); return; }
  const today = new Date(); today.setHours(0,0,0,0);
  const examDate = new Date(examDateVal); examDate.setHours(0,0,0,0);
  if (examDate < today) { alert('Exam date cannot be in the past.'); return; }

  const dDay = Math.ceil((examDate - today) / 86400000);
  const days = Math.min(dDay, 30);

  document.getElementById('stat-subject').textContent = subject;
  document.getElementById('stat-days').textContent = 'D-' + dDay;
  document.getElementById('result').style.display = 'block';

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  setStatus('Claude AI is building your personalized roadmap…');

  const levelMap = {
    zero: 'absolute beginner who needs full concept coverage from scratch',
    intermediate: 'intermediate learner who knows the basics and needs focused practice',
    advanced: 'advanced student who needs intensive exam drilling and timed mock tests'
  };

  const prompt = `You are an expert academic tutor creating a personalized study plan.

Subject: ${subject}
Student level: ${levelMap[level]}
Days until exam: ${days}
Daily study time: ${hours} hour(s)

Create a detailed day-by-day study schedule for exactly ${days} days. The last day should be exam day.

Respond ONLY with a valid JSON array (no markdown, no extra text) with exactly ${days} objects, each with:
- "day": number (1 to ${days})
- "type": one of ["Concept", "Practice", "Problem Set", "Review", "Mock Exam", "Exam Day", "Rest"]
- "task": specific, actionable task description (1-2 sentences, tailored to ${subject})
- "diff": one of ["easy", "medium", "hard"]

Make tasks specific to ${subject} — name actual topics, chapters, or skills. The last entry must have type "Exam Day".`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const aiDays = JSON.parse(clean);

    planData = aiDays.map((d, i) => {
      const dateObj = new Date(today);
      dateObj.setDate(today.getDate() + i);
      return {
        day: d.day, date: dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
        type: d.type, task: d.task, diff: d.diff || 'medium', note: '', done: false
      };
    });
    setStatus('');
  } catch (err) {
    setStatus('Could not reach Claude AI — showing a sample plan instead.');
    planData = buildFallback(subject, level, hours, days, today);
  }

  renderList();
  renderWeekGrid();
  updateProgress();
  saveToStorage();
  btn.disabled = false;
  btn.classList.remove('loading');
}

function buildFallback(subject, level, hours, days, today) {
  const types = level === 'advanced'
    ? ['Review','Mock Exam','Problem Set','Review']
    : level === 'intermediate'
    ? ['Concept','Practice','Problem Set','Review']
    : ['Concept','Concept','Practice','Problem Set','Review'];

  return Array.from({ length: days }, (_, i) => {
    const dateObj = new Date(today);
    dateObj.setDate(today.getDate() + i);
    const t = i === days - 1 ? 'Exam Day' : types[i % types.length];
    return {
      day: i + 1,
      date: dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
      type: t,
      task: t === 'Exam Day'
        ? 'Exam day. Stay calm and trust your preparation.'
        : 'Day ' + (i+1) + ' — ' + t + ' session for ' + subject + ' (' + hours + ' hrs).',
      diff: i < days * .4 ? 'easy' : i < days * .75 ? 'medium' : 'hard',
      note: '', done: false
    };
  });
}

function renderList() {
  const body = document.getElementById('schedule-body');
  body.innerHTML = '';
  planData.forEach((row, i) => {
    const tr = document.createElement('tr');
    if (row.done) tr.classList.add('done');
    tr.innerHTML =
      '<td style="text-align:center"><input type="checkbox"' + (row.done ? ' checked' : '') + ' onchange="toggleDone(' + i + ', this)"></td>' +
      '<td><div class="day-label">Day ' + row.day + '</div><div class="date-sub">' + row.date + '</div></td>' +
      '<td><span class="tag ' + tagClass(row.type) + '">' + row.type + '</span>' +
      '<span class="task-text">' + row.task + '</span>' +
      '<br><textarea class="note-input" rows="1" placeholder="+ Add note…" oninput="saveNote(' + i + ', this.value)">' + (row.note || '') + '</textarea></td>' +
      '<td><span class="diff-dot ' + diffClass(row.diff) + '"></span><span style="font-size:.82rem;color:var(--text2);text-transform:capitalize">' + row.diff + '</span></td>';
    body.appendChild(tr);
  });
}

function renderWeekGrid() {
  const headers = document.getElementById('week-headers');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  headers.innerHTML = days.map(d => '<div class="week-day-header">' + d + '</div>').join('');
  renderWeekCells();
}

function renderWeekCells() {
  const cells = document.getElementById('week-cells');
  cells.innerHTML = '';
  const start = currentWeek * 7;
  document.getElementById('week-label').textContent = 'Week ' + (currentWeek + 1);
  for (let i = 0; i < 7; i++) {
    const idx = start + i;
    const div = document.createElement('div');
    if (idx >= planData.length) {
      div.className = 'week-cell';
      div.style.cssText = 'background:transparent;border:1px dashed var(--border);opacity:.3';
    } else {
      const row = planData[idx];
      div.className = 'week-cell' + (row.done ? ' done-cell' : '');
      div.innerHTML =
        '<div class="cell-day">Day ' + row.day + '</div>' +
        '<div class="cell-tag">' + row.type + '</div>' +
        '<div class="cell-snippet">' + row.task + '</div>' +
        '<span class="week-check">' + (row.done ? '✅' : '') + '</span>';
      div.onclick = () => { toggleDone(idx); renderWeekCells(); updateProgress(); };
    }
    cells.appendChild(div);
  }
}

function weekNav(dir) {
  const maxWeek = Math.floor((planData.length - 1) / 7);
  currentWeek = Math.max(0, Math.min(maxWeek, currentWeek + dir));
  renderWeekCells();
}

function toggleDone(idx, cb) {
  planData[idx].done = cb ? cb.checked : !planData[idx].done;
  const rows = document.querySelectorAll('#schedule-body tr');
  if (rows[idx]) {
    if (planData[idx].done) rows[idx].classList.add('done');
    else rows[idx].classList.remove('done');
    const chk = rows[idx].querySelector('input[type=checkbox]');
    if (chk) chk.checked = planData[idx].done;
  }
  updateProgress();
  saveToStorage();
}

function saveNote(idx, val) { planData[idx].note = val; saveToStorage(); }

function updateProgress() {
  if (!planData.length) return;
  const done = planData.filter(r => r.done).length;
  const total = planData.length;
  const pct = Math.round(done / total * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = done + ' / ' + total + ' tasks';
}

function switchView(v, btn) {
  currentView = v;
  document.getElementById('list-view').style.display = v === 'list' ? '' : 'none';
  document.getElementById('week-view').style.display = v === 'week' ? '' : 'none';
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (v === 'week') renderWeekCells();
}

function clearPlan() {
  planData = [];
  document.getElementById('result').style.display = 'none';
  document.getElementById('schedule-body').innerHTML = '';
  localStorage.removeItem(STORAGE_KEY);
}

function exportTxt() {
  if (!planData.length) { alert('Generate a plan first!'); return; }
  const subj = document.getElementById('stat-subject').textContent;
  let txt = '=== SmartStudy AI Plan: ' + subj + ' ===\n\n';
  planData.forEach(r => {
    txt += '[Day ' + r.day + ' | ' + r.date + '] (' + r.type + ' / ' + r.diff + ')\n' + r.task + '\n';
    if (r.note) txt += 'Note: ' + r.note + '\n';
    if (r.done) txt += '✓ Completed\n';
    txt += '\n';
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain' }));
  a.download = 'SmartStudy_' + subj.replace(/\s/g,'_') + '.txt';
  a.click();
}

function tagClass(type) {
  if (type === 'Concept') return 'tag-concept';
  if (['Practice','Problem Set'].includes(type)) return 'tag-practice';
  if (['Mock Exam','Exam Day'].includes(type)) return 'tag-exam';
  if (['Review','Rest'].includes(type)) return 'tag-review';
  return 'tag-concept';
}
function diffClass(d) {
  return { easy: 'diff-easy', medium: 'diff-medium', hard: 'diff-hard' }[d] || 'diff-medium';
}
function setStatus(msg) {
  const el = document.getElementById('ai-status');
  el.innerHTML = msg ? '<span class="blink">●</span> ' + msg : '';
}
function saveToStorage() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(planData)); } catch(e) {} }
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    planData = JSON.parse(raw);
    if (!planData.length) return;
    document.getElementById('result').style.display = 'block';
    document.getElementById('stat-subject').textContent = '(Saved Plan)';
    document.getElementById('stat-days').textContent = '—';
    renderList(); renderWeekGrid(); updateProgress();
  } catch(e) {}
}
</script>
</body>
</html>
