<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy AI - Emergency 30-Day Crash Course Planner</title>
    <style>
        :root {
            --primary-color: #e74c3c;
            --secondary-color: #f5f7fa;
            --text-color: #333333;
            --accent-color: #2ecc71;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }

        h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
            margin-top: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fafafa;
        }

        input[readonly] {
            background-color: #e9ecef;
            cursor: not-allowed;
        }

        .btn-container {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #c0392b;
        }

        .btn-export {
            background-color: #34495e;
        }
        .btn-export:hover {
            background-color: #2c3e50;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            background-color: var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
        }

        .dashboard-item {
            text-align: center;
            flex: 1;
        }

        .dashboard-item .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .progress-bar-container {
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: var(--secondary-color);
            color: var(--text-color);
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .checkbox-cell {
            text-align: center;
            width: 50px;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
        }

        .completed-text {
            text-decoration: line-through;
            color: #888888;
            opacity: 0.6;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            margin-right: 5px;
        }
        .badge-danger { background-color: #e74c3c; }
        .badge-theory { background-color: #e67e22; }
        .badge-code { background-color: #2980b9; }
        .badge-review { background-color: #16a085; }
    </style>
</head>
<body>

<div class="container">
    <h1>SmartStudy AI: 30-Day Crash Course</h1>
    
    <div id="planner-form">
        <div class="form-group">
            <label for="exam-name">Target Exam Name</label>
            <input type="text" id="exam-name" value="AP Computer Science A" readonly>
        </div>
        
        <div class="form-group">
            <label for="exam-date">Set Exam Date</label>
            <input type="date" id="exam-date">
        </div>
        
        <div class="form-group">
            <label for="weak-topics">Current Status</label>
            <input type="text" id="weak-topics" value="Zero-Base / Absolute Beginner (All Units Needed)" readonly>
        </div>
        
        <div class="form-group">
            <label for="study-hours">Daily Intensive Study Time (Fixed)</label>
            <input type="text" id="study-hours" value="3 Hours / Day" readonly>
        </div>
        
        <div class="btn-container">
            <button type="button" onclick="generateEmergencyPlan()">Generate 30-Day Emergency Roadmap</button>
            <button type="button" class="btn-export" onclick="exportScheduleTxt()">Export as TXT</button>
        </div>
    </div>

    <div id="result-section" class="result-section">
        <h2>🚨 Emergency Learning Dashboard</h2>
        
        <div class="dashboard">
            <div class="dashboard-item">
                <div>Status Alert</div>
                <div class="value" style="font-size: 1.1rem; margin-top: 5px;"><span class="badge badge-danger">CRASH COURSE ACTIVE</span></div>
            </div>
            <div class="dashboard-item">
                <div>Time Remaining</div>
                <div id="d-day-val" class="value">D-30</div>
            </div>
            <div class="dashboard-item">
                <div>Milestones Met</div>
                <div id="progress-val" class="value">0%</div>
            </div>
        </div>

        <label>Overall 30-Day Completion</label>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <h2>30-Day Day-by-Day Micro-Tasks (No Gaps)</h2>
        <table id="schedule-table">
            <thead>
                <tr>
                    <th class="checkbox-cell">Done</th>
                    <th style="width: 100px;">Timeline</th>
                    <th>Intensive Curriculum Breakdown (3 Hours Daily)</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 전역 스케줄 텍스트 저장용 변수 (다운로드 기능용)
    let generatedPlanText = "";

    window.onload = function() {
        const defaultDate = new Date();
        defaultDate.setDate(defaultDate.getDate() + 30);
        document.getElementById('exam-date').value = defaultDate.toISOString().split('T')[0];
    }

    function generateEmergencyPlan() {
        const examDateInput = document.getElementById('exam-date').value;
        if (!examDateInput) {
            alert('Please select an exam date!');
            return;
        }

        const today = new Date();
        today.setHours(0,0,0,0);
        const examDate = new Date(examDateInput);
        examDate.setHours(0,0,0,0);
        
        // [추가 기능] 1. Exception Handling: 날짜 유효성 검사 알고리즘
        if (examDate < today) {
            alert("Error: The exam date cannot be in the past! Please select a valid future date.");
            return;
        }

        const timeDiff = examDate.getTime() - today.getTime();
        const dDay = Math.ceil(timeDiff / (1000 * 3600 * 24));
        
        document.getElementById('d-day-val').innerText = `D-${dDay}`;

        const scheduleBody = document.getElementById('schedule-body');
        scheduleBody.innerHTML = ""; 
        generatedPlanText = `=== AP CS A 30-Day Emergency Study Plan (D-${dDay} Remaining) ===\n\n`;

        const emergencyCurriculum = [
            { type: "Theory", label: "Unit 1: Primitive Types", task: "Variables, int/double casting rules, and compiler behaviors." },
            { type: "Coding", label: "Unit 1 Practice", task: "Write basic arithmetic expressions and observe truncation logs." },
            { type: "Theory", label: "Unit 2: Using Objects", task: "String methods (substring, indexOf), Math class, and wrappers." },
            { type: "Coding", label: "Unit 2 Practice", task: "Instantiate objects via constructors and execute void/return methods." },
            { type: "Theory", label: "Unit 3: Boolean Expressions", task: "Logical operators, short-circuit evaluation, and De Morgan's Laws." },
            { type: "Coding", label: "Unit 3 Practice", task: "Implement complex nested if-else statements for grade analyzers." },
            { type: "Theory", label: "Unit 4: Iteration", task: "Structure of for loops, while loops, and tracing loops variations." },
            { type: "Coding", label: "Unit 4 Practice", task: "Build algorithms using nested loops to trace patterns and string indexes." },
            { type: "Theory", label: "Unit 5: Writing Classes", task: "Private fields, public constructors, accessor/mutator structures." },
            { type: "Coding", label: "Unit 5 Practice", task: "Encapsulate data models and design a functional custom class layout." },
            { type: "Theory", label: "Unit 6: Arrays", task: "1D Array allocation, static bounds, and default primitive initializations." },
            { type: "Coding", label: "Unit 6 Practice", task: "Implement basic search array algorithms (minimum, maximum element sweeps)." },
            { type: "Theory", label: "Unit 7: ArrayList", task: "Dynamic allocation, list methods (add, remove, set) and size shifts." },
            { type: "Coding", label: "Unit 7 Practice", task: "Traverse and remove specific items without hitting ConcurrentModification errors." },
            { type: "Theory", label: "Unit 8: 2D Arrays", task: "Row-major vs Column-major configurations and memory addressing." },
            { type: "Coding", label: "Unit 8 Practice", task: "Process tabular datasets using loops to map data patterns." },
            { type: "Theory", label: "Unit 9: Inheritance", task: "Superclass/subclass trees, polymorphism, method overriding, and constructors." },
            { type: "Coding", label: "Unit 9 Practice", task: "Code functional extends structures and verify implicit casting behaviors." },
            { type: "Theory", label: "Unit 10: Recursion", task: "Base cases, structural execution stacks, and tracing tree nodes." },
            { type: "Coding", label: "Unit 10 Practice", task: "Perform tracing on paper for complex factorial or fibonacci stacks." },
            { type: "FRQ Core", label: "FRQ Tactics 1", task: "Analyze Methods and Control Structures requirements." },
            { type: "FRQ Core", label: "FRQ Tactics 2", task: "Review class architecture criteria and object instantiation grids." },
            { type: "FRQ Core", label: "FRQ Tactics 3", task: "Implement complex Array/ArrayList data filters (High score yield)." },
            { type: "FRQ Core", label: "FRQ Tactics 4", task: "Construct 2D array grid locators and boundary constraint models." },
            { type: "Mock Exam", label: "Diagnostic Test 1", task: "Take a full length practice exam with strict timeline boundaries." },
            { type: "Review", label: "Error Logging 1", task: "Isolate structural gaps, trace flawed MCQs logic blocks." },
            { type: "Mock Exam", label: "Diagnostic Test 2", task: "Execute second full-length test to optimize pacing metrics." },
            { type: "Review", label: "Error Logging 2", task: "Verify edge-case handling routines and check default variable setups." },
            { type: "Final Check", label: "Sheet Review", task: "Final trace of personal error logs and official Java Quick Reference document rules." },
            { type: "Exam Day", label: "Execution", task: "Arrive prepared. Execute 30 days of structured 3-hour habits." }
        ];

        for (let i = 0; i < 30; i++) {
            const item = emergencyCurriculum[i];
            let badgeClass = "badge-theory";
            if (item.type === "Coding") badgeClass = "badge-code";
            if (item.type === "FRQ Core" || item.type === "Mock Exam" || item.type === "Review") badgeClass = "badge-review";
            if (item.type === "Final Check" || item.type === "Exam Day") badgeClass = "badge-danger";

            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="checkbox-cell"><input type="checkbox" onchange="updateProgress()" id="check-${i}"></td>
                <td><strong>Day ${i + 1}</strong></td>
                <td id="text-${i}"><span class="badge ${badgeClass}">${item.type}</span> <strong>${item.label}</strong>: ${item.task}</td>
            `;
            scheduleBody.appendChild(row);

            // 다운로드용 텍스트 구축
            generatedPlanText += `[Day ${i + 1}] (${item.type}) ${item.label} - ${item.task}\n`;
        }

        document.getElementById('result-section').style.display = 'block';
        updateProgress();
    }

    function updateProgress() {
        const checkboxes = document.querySelectorAll('#schedule-body input[type="checkbox"]');
        if (checkboxes.length === 0) return;

        let checkedCount = 0;
        checkboxes.forEach((cb, index) => {
            const textCell = document.getElementById(`text-${index}`);
            if (cb.checked) {
                checkedCount++;
                textCell.classList.add('completed-text');
            } else {
                textCell.classList.remove('completed-text');
            }
        });

        const percentage = Math.round((checkedCount / checkboxes.length) * 100);
        document.getElementById('progress-val').innerText = `${checkedCount} / ${checkboxes.length} (${percentage}%)`;
        document.getElementById('progress-bar').style.width = `${percentage}%`;
    }

    // [추가 기능] 2. 데이터 처리 알고리즘: 생성된 30일치 텍스트 파일 내보내기 (.txt File IO)
    function exportScheduleTxt() {
        if (!generatedPlanText) {
            alert("Please generate the roadmap first before exporting!");
            return;
        }
        const blob = new Blob([generatedPlanText], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "AP_CS_A_30Day_Emergency_Plan.txt";
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
