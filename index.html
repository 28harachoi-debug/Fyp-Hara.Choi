<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy AI - Fully Customizable Learning Planner</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --text-color: #333333;
            --accent-color: #2ecc71;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }

        h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
            margin-top: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fafafa;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 2;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        .btn-export {
            flex: 1;
            background-color: #34495e;
        }
        .btn-export:hover {
            background-color: #2c3e50;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            background-color: var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
        }

        .dashboard-item {
            text-align: center;
            flex: 1;
        }

        .dashboard-item .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .progress-bar-container {
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: var(--secondary-color);
            color: var(--text-color);
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .checkbox-cell {
            text-align: center;
            width: 50px;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
        }

        .completed-text {
            text-decoration: line-through;
            color: #888888;
            opacity: 0.6;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            margin-right: 5px;
        }
        .badge-theory { background-color: #e67e22; }
        .badge-code { background-color: #2980b9; }
        .badge-review { background-color: #16a085; }
        .badge-danger { background-color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>SmartStudy AI Custom Planner</h1>
    
    <div id="planner-form">
        <div class="form-group">
            <label for="exam-name">1. Select Target Subject (과목 선택)</label>
            <select id="exam-name">
                <option value="AP Computer Science A">AP Computer Science A</option>
                <option value="AP Computer Science Principles">AP Computer Science Principles</option>
                <option value="AP Calculus AB/BC">AP Calculus AB/BC</option>
                <option value="AP Statistics">AP Statistics</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="exam-date">2. Set Exam Date (시험 날짜 선택)</label>
            <input type="date" id="exam-date">
        </div>
        
        <div class="form-group">
            <label for="start-level">3. Choose Your Starting Point (학습 시작포인트 선택)</label>
            <select id="start-level">
                <option value="zero">Zero-Base (Absolute Beginner - Need full concepts)</option>
                <option value="intermediate">Intermediate (Know basics - Need core practice & logic tracking)</option>
                <option value="advanced">Advanced (Need intensive FRQ drilling & mock exams only)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="study-hours">4. Daily Study Time (하루 공부 시간 설정)</label>
            <input type="number" id="study-hours" min="1" max="24" value="3">
        </div>
        
        <div class="btn-container">
            <button type="button" onclick="generateCustomPlan()">Generate Customized AI Roadmap</button>
            <button type="button" class="btn-export" onclick="exportScheduleTxt()">Export as TXT</button>
        </div>
    </div>

    <div id="result-section" class="result-section">
        <h2>✨ Your Personalized AI Dashboard</h2>
        
        <div class="dashboard">
            <div class="dashboard-item">
                <div>Subject Fitted</div>
                <div id="subject-val" class="value" style="font-size: 1.1rem; margin-top: 5px; color: #2c3e50;">-</div>
            </div>
            <div class="dashboard-item">
                <div>Time Remaining</div>
                <div id="d-day-val" class="value">D-00</div>
            </div>
            <div class="dashboard-item">
                <div>Milestones Met</div>
                <div id="progress-val" class="value">0%</div>
            </div>
        </div>

        <label>Overall Completion Progress</label>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <h2>Customized Study Schedule (Day-by-Day Micro-tasks)</h2>
        <table id="schedule-table">
            <thead>
                <tr>
                    <th class="checkbox-cell">Done</th>
                    <th style="width: 100px;">Timeline</th>
                    <th>Intensive Curriculum Breakdown</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    let generatedPlanText = "";

    // 오늘 날짜 기준 30일 뒤를 기본값으로 캘린더 세팅
    window.onload = function() {
        const defaultDate = new Date();
        defaultDate.setDate(defaultDate.getDate() + 30);
        document.getElementById('exam-date').value = defaultDate.toISOString().split('T')[0];
    }

    function generateCustomPlan() {
        const examDateInput = document.getElementById('exam-date').value;
        if (!examDateInput) {
            alert('Please select an exam date!');
            return;
        }

        const today = new Date();
        today.setHours(0,0,0,0);
        const examDate = new Date(examDateInput);
        examDate.setHours(0,0,0,0);
        
        // Exception Handling: 과거 날짜 선택 방지
        if (examDate < today) {
            alert("Error: The exam date cannot be in the past!");
            return;
        }

        const timeDiff = examDate.getTime() - today.getTime();
        const dDay = Math.ceil(timeDiff / (1000 * 3600 * 24));
        
        const subject = document.getElementById('exam-name').value;
        const level = document.getElementById('start-level').value;
        const hours = document.getElementById('study-hours').value;

        // 대시보드 정보 업데이트
        document.getElementById('d-day-val').innerText = `D-${dDay}`;
        document.getElementById('subject-val').innerText = subject;

        const scheduleBody = document.getElementById('schedule-body');
        scheduleBody.innerHTML = ""; 
        generatedPlanText = `=== AI Custom Study Roadmap for ${subject} ===\n`;
        generatedPlanText += `Remaining Time: D-${dDay} | Target Study: ${hours} Hours Daily\n\n`;

        // 사용자의 '시작 포인트(Level)' 선택에 맞는 템플릿 알고리즘 분기 설계
        let taskTemplates = [];

        if (level === "zero") {
            // 1) 노베이스 선택 시: 이론 위주의 탄탄한 단계별 설계
            taskTemplates = [
                { type: "Theory", task: `Comprehensive overview of Unit 1 foundational syntax structure (${hours} hours).` },
                { type: "Coding", task: "Write static variables sample layouts and analyze compiled tracking logs." },
                { type: "Theory", task: `Study Unit 2 standard library utilities and native method triggers for ${hours} hours.` },
                { type: "Coding", task: "Practice object instantiation structures using default constructors." },
                { type: "Theory", task: "Unit 3 Boolean operations and complex nested branch decision pathways." },
                { type: "Coding", task: "Code functional conditional evaluations and trace nested truth tables." },
                { type: "Theory", task: "Unit 4 Loop behaviors. Breakdown for-loops and standard while boundaries." },
                { type: "Coding", task: "Write pattern layouts using nested loops and observe index trace behaviors." },
                { type: "Theory", task: "Unit 5 Class blueprints design. Restructuring encapsulation visibility properties." },
                { type: "Coding", task: "Implement private access fields and write custom getter/setter modules." }
            ];
        } else if (level === "intermediate") {
            // 2) 기초 보유 선택 시: 배열 탐색, 알고리즘 추적 및 데이터 가공 중심 설계
            taskTemplates = [
                { type: "Theory", task: `Deep dive into Unit 6 1D Arrays index management systems (${hours} hours).` },
                { type: "Coding", task: "Implement standard algorithms to swap components and locate min/max metrics." },
                { type: "Theory", task: `Study Unit 7 dynamic ArrayLists and mutating operations for ${hours} hours.` },
                { type: "Coding", task: "Trace and resolve ConcurrentModification limits inside standard loops." },
                { type: "Theory", task: "Unit 8 2D Array matrices configurations. Row-major traversal analysis." },
                { type: "Coding", task: "Code nested iterations to process grid coordinate boundaries data maps." },
                { type: "Theory", task: "Unit 9 Polymorphic layouts and method override lookup sequences." },
                { type: "Coding", task: "Build structured class inheritance trees and utilize super keyword overrides." },
                { type: "Theory", task: "Unit 10 Recursion mechanics. Track base case constraints and execution pools." },
                { type: "Coding", task: "Perform manual tree parsing configurations for complex functional stacks." }
            ];
        } else {
            // 3) 실전형 선택 시: 고난도 FRQ 디버깅 및 전체 모의고사 몰입 설계
            taskTemplates = [
                { type: "FRQ Core", task: `Intensive review of Category 1 Free Response constraints (${hours} hours).` },
                { type: "Coding", task: "Write class design layouts on paper matching specific rubrics keys." },
                { type: "FRQ Core", task: `Execute Category 3 array manipulation routines data sweeps for ${hours} hours.` },
                { type: "Coding", task: "Code optimal linear scans avoiding indexing out-of-bounds safety traps." },
                { type: "FRQ Core", task: "Deconstruct Category 4 grid navigation and column traversal strategies." },
                { type: "Coding", task: "Implement robust grid search functions under strict execution time limits." },
                { type: "Mock Exam", task: "Run full length mock examination under identical real-world constraints." },
                { type: "Review", task: "Analyze faulty Multiple Choice logic blocks and patch knowledge gaps." },
                { type: "Mock Exam", task: "Run second diagnostic assessment mock sweep to elevate tracking curves." },
                { type: "Review", task: "Re-read official Quick Reference formula syntax constraints sheet definitions." }
            ];
        }

        // 사용자의 실제 남은 D-Day 기간에 비례하도록 데이터 확장 반복 루프 (CS Array mapping)
        const totalDaysToShow = Math.min(dDay, 30); // 최대 30일치로 밸런스 패치 조정
        
        for (let i = 0; i < totalDaysToShow; i++) {
            // 템플릿 항목을 순환 적용하여 매일 다른 균형 잡힌 타임라인 노출
            const templateItem = taskTemplates[i % taskTemplates.length];
            
            let badgeClass = "badge-theory";
            if (templateItem.type === "Coding") badgeClass = "badge-code";
            if (templateItem.type === "FRQ Core" || templateItem.type === "Mock Exam" || templateItem.type === "Review") badgeClass = "badge-review";

            // 마지막 이틀은 시험 마무리 단계로 고정 배치하는 스마트 연산
            let displayType = templateItem.type;
            let displayTask = templateItem.task;
            
            if (i === totalDaysToShow - 2) {
                badgeClass = "badge-danger";
                displayType = "Final";
                displayTask = `Review accumulated personal error logs compiled for ${subject}.`;
            } else if (i === totalDaysToShow - 1) {
                badgeClass = "badge-danger";
                displayType = "Exam";
                displayTask = `Maintain solid composure. Execute the optimal routines built over the past weeks.`;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="checkbox-cell"><input type="checkbox" onchange="updateProgress()" id="check-${i}"></td>
                <td><strong>Day ${i + 1}</strong></td>
                <td id="text-${i}"><span class="badge ${badgeClass}">${displayType}</span> ${displayTask}</td>
            `;
            scheduleBody.appendChild(row);

            generatedPlanText += `[Day ${i + 1}] (${displayType}) ${displayTask}\n`;
        }

        document.getElementById('result-section').style.display = 'block';
        updateProgress();
    }

    function updateProgress() {
        const checkboxes = document.querySelectorAll('#schedule-body input[type="checkbox"]');
        if (checkboxes.length === 0) return;

        let checkedCount = 0;
        checkboxes.forEach((cb, index) => {
            const textCell = document.getElementById(`text-${index}`);
            if (cb.checked) {
                checkedCount++;
                textCell.classList.add('completed-text');
            } else {
                textCell.classList.remove('completed-text');
            }
        });

        const percentage = Math.round((checkedCount / checkboxes.length) * 100);
        document.getElementById('progress-val').innerText = `${checkedCount} / ${checkboxes.length} (${percentage}%)`;
        document.getElementById('progress-bar').style.width = `${percentage}%`;
    }

    function exportScheduleTxt() {
        if (!generatedPlanText) {
            alert("Please generate the roadmap first before exporting!");
            return;
        }
        const blob = new Blob([generatedPlanText], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "My_Custom_AI_Study_Plan.txt";
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
