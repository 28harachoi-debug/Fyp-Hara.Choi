<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy AI - Fully Customizable Learning Planner</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --text-color: #333333;
            --accent-color: #2ecc71;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }

        h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
            margin-top: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fafafa;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 2;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        .btn-export {
            flex: 1;
            background-color: #34495e;
        }
        .btn-export:hover {
            background-color: #2c3e50;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            background-color: var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
        }

        .dashboard-item {
            text-align: center;
            flex: 1;
        }

        .dashboard-item .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .progress-bar-container {
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: var(--secondary-color);
            color: var(--text-color);
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .checkbox-cell {
            text-align: center;
            width: 50px;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
        }

        .completed-text {
            text-decoration: line-through;
            color: #888888;
            opacity: 0.6;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            margin-right: 5px;
        }
        .badge-theory { background-color: #e67e22; }
        .badge-code { background-color: #2980b9; }
        .badge-review { background-color: #16a085; }
        .badge-danger { background-color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>SmartStudy AI Custom Planner</h1>
    
    <div id="planner-form">
        <div class="form-group">
            <label for="exam-name">1. Select Target Subject</label>
            <select id="exam-name">
                <optgroup label="Computer Science & Math (AP)">
                    <option value="AP Computer Science A">AP Computer Science A</option>
                    <option value="AP Computer Science Principles">AP Computer Science Principles</option>
                    <option value="AP Calculus AB">AP Calculus AB</option>
                    <option value="AP Calculus BC">AP Calculus BC</option>
                    <option value="AP Statistics">AP Statistics</option>
                </optgroup>
                <optgroup label="Sciences (AP)">
                    <option value="AP Physics 1 / C">AP Physics 1 / C</option>
                    <option value="AP Chemistry">AP Chemistry</option>
                    <option value="AP Biology">AP Biology</option>
                    <option value="AP Environmental Science">AP Environmental Science</option>
                </optgroup>
                <optgroup label="History & Social Sciences (AP)">
                    <option value="AP U.S. History">AP U.S. History</option>
                    <option value="AP World History">AP World History</option>
                    <option value="AP European History">AP European History</option>
                    <option value="AP Macro/Microeconomics">AP Macro/Microeconomics</option>
                    <option value="AP Psychology">AP Psychology</option>
                </optgroup>
                <optgroup label="English & Languages (AP)">
                    <option value="AP English Language & Composition">AP English Language & Composition</option>
                    <option value="AP English Literature & Composition">AP English Literature & Composition</option>
                </optgroup>
                <optgroup label="School GPA Courses (Honors / Regular)">
                    <option value="Algebra 1 / 2 (Honors)">Algebra 1 / 2 (Honors)</option>
                    <option value="Geometry (Honors)">Geometry (Honors)</option>
                    <option value="Pre-Calculus (Honors)">Pre-Calculus (Honors)</option>
                    <option value="Biology (Honors/Regular)">Biology (Honors/Regular)</option>
                    <option value="Chemistry (Honors/Regular)">Chemistry (Honors/Regular)</option>
                    <option value="Physics (Honors/Regular)">Physics (Honors/Regular)</option>
                    <option value="World History (Honors/Regular)">World History (Honors/Regular)</option>
                    <option value="English 9-12 (Honors/Regular)">English 9-12 (Honors/Regular)</option>
                </optgroup>
            </select>
        </div>
        
        <div class="form-group">
            <label for="exam-date">2. Set Exam / Test Date</label>
            <input type="date" id="exam-date">
        </div>
        
        <div class="form-group">
            <label for="start-level">3. Choose Your Starting Point</label>
            <select id="start-level">
                <option value="zero">Zero-Base (Absolute Beginner - Need full concepts)</option>
                <option value="intermediate">Intermediate (Know basics - Need core practice & logic tracking)</option>
                <option value="advanced">Advanced (Need intensive exam drilling & mock exams only)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="study-hours">4. Daily Study Time (Hours)</label>
            <input type="number" id="study-hours" min="1" max="24" value="3">
        </div>
        
        <div class="btn-container">
            <button type="button" onclick="generateCustomPlan()">Generate Customized AI Roadmap</button>
            <button type="button" class="btn-export" onclick="exportScheduleTxt()">Export as TXT</button>
        </div>
    </div>

    <div id="result-section" class="result-section">
        <h2>✨ Your Personalized AI Dashboard</h2>
        
        <div class="dashboard">
            <div class="dashboard-item">
                <div>Subject Fitted</div>
                <div id="subject-val" class="value" style="font-size: 1.1rem; margin-top: 5px; color: #2c3e50;">-</div>
            </div>
            <div class="dashboard-item">
                <div>Time Remaining</div>
                <div id="d-day-val" class="value">D-00</div>
            </div>
            <div class="dashboard-item">
                <div>Milestones Met</div>
                <div id="progress-val" class="value">0%</div>
            </div>
        </div>

        <label>Overall Completion Progress</label>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <h2>Customized Study Schedule (Day-by-Day Micro-tasks)</h2>
        <table id="schedule-table">
            <thead>
                <tr>
                    <th class="checkbox-cell">Done</th>
                    <th style="width: 100px;">Timeline</th>
                    <th>Intensive Curriculum Breakdown</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    let generatedPlanText = "";

    // Set default target date to 30 days from today
    window.onload = function() {
        const defaultDate = new Date();
        defaultDate.setDate(defaultDate.getDate() + 30);
        document.getElementById('exam-date').value = defaultDate.toISOString().split('T')[0];
    }

    function generateCustomPlan() {
        const examDateInput = document.getElementById('exam-date').value;
        if (!examDateInput) {
            alert('Please select an exam date!');
            return;
        }

        const today = new Date();
        today.setHours(0,0,0,0);
        const examDate = new Date(examDateInput);
        examDate.setHours(0,0,0,0);
        
        // Exception Handling: Prevent selecting a past date
        if (examDate < today) {
            alert("Error: The exam date cannot be in the past!");
            return;
        }

        const timeDiff = examDate.getTime() - today.getTime();
        const dDay = Math.ceil(timeDiff / (1000 * 3600 * 24));
        
        const subject = document.getElementById('exam-name').value;
        const level = document.getElementById('start-level').value;
        const hours = document.getElementById('study-hours').value;

        // Update dashboard UI elements
        document.getElementById('d-day-val').innerText = `D-${dDay}`;
        document.getElementById('subject-val').innerText = subject;

        const scheduleBody = document.getElementById('schedule-body');
        scheduleBody.innerHTML = ""; 
        generatedPlanText = `=== AI Custom Study Roadmap for ${subject} ===\n`;
        generatedPlanText += `Remaining Time: D-${dDay} | Target Study: ${hours} Hours Daily\n\n`;

        // Strategy allocation algorithm based on chosen starting points
        let taskTemplates = [];

        if (level === "zero") {
            taskTemplates = [
                { type: "Theory", task: `Comprehensive overview of Unit 1 fundamental syntax structure (${hours} hours).` },
                { type: "Practice", task: "Solve core concept check questions and trace structural workflows." },
                { type: "Theory", task: `Study Unit 2 standard library utilities and core functional properties for ${hours} hours.` },
                { type: "Practice", task: "Practice identifying data types and mapping sample layouts." },
                { type: "Theory", task: "Unit 3 structural operations and complex branch decision pathways." },
                { type: "Practice", task: "Complete basic textbook exercises and trace logic truth tables." },
                { type: "Theory", task: "Unit 4 loop mechanics. Breakdown core properties and exit criteria variables." },
                { type: "Practice", task: "Trace basic loop variable modifications over multiple iterations manually." }
            ];
        } else if (level === "intermediate") {
            taskTemplates = [
                { type: "Theory", task: `Deep dive into advanced thematic subtopics and index frameworks (${hours} hours).` },
                { type: "Practice", task: "Implement standard algorithms to re-arrange components and locate metrics." },
                { type: "Theory", task: `Study complex dynamic lists and mutating operational rules for ${hours} hours.` },
                { type: "Practice", task: "Trace and resolve standard runtime exceptions inside typical loop segments." },
                { type: "Theory", task: "Multi-dimensional tracking matrices structures and dimensional data traversals." },
                { type: "Practice", task: "Solve data filtering worksheets and examine multi-tiered data boundaries." }
            ];
        } else {
            taskTemplates = [
                { type: "Exam Prep", task: `Intensive review of High-Yield Free Response criteria and rubrics (${hours} hours).` },
                { type: "Practice", task: "Draft full responses on paper matching precise sample constraints." },
                { type: "Exam Prep", task: `Execute strict timed multiple-choice item sweeps for ${hours} hours.` },
                { type: "Practice", task: "Analyze wrong answers and isolate recurring logic traps under timed conditions." },
                { type: "Mock Exam", task: "Run full length diagnostic examination under identical real-world constraints." },
                { type: "Review", task: "Deconstruct mock assessment metrics and verify formula boundaries logs." }
            ];
        }

        // Mapping loop algorithm relative to remaining D-Day value
        const totalDaysToShow = Math.min(dDay, 30); // Max cap at 30 days for design balance
        
        for (let i = 0; i < totalDaysToShow; i++) {
            const templateItem = taskTemplates[i % taskTemplates.length];
            
            let badgeClass = "badge-theory";
            if (templateItem.type === "Practice") badgeClass = "badge-code";
            if (templateItem.type === "Exam Prep" || templateItem.type === "Mock Exam" || templateItem.type === "Review") badgeClass = "badge-review";

            let displayType = templateItem.type;
            let displayTask = templateItem.task;
            
            // Allocate final 2 days for structural exam wrappers
            if (i === totalDaysToShow - 2) {
                badgeClass = "badge-danger";
                displayType = "Final";
                displayTask = `Review accumulated personal error logs compiled for ${subject}.`;
            } else if (i === totalDaysToShow - 1) {
                badgeClass = "badge-danger";
                displayType = "Exam";
                displayTask = `Maintain solid composure. Execute the optimal routines built over the past weeks.`;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="checkbox-cell"><input type="checkbox" onchange="updateProgress()" id="check-${i}"></td>
                <td><strong>Day ${i + 1}</strong></td>
                <td id="text-${i}"><span class="badge ${badgeClass}">${displayType}</span> ${displayTask}</td>
            `;
            scheduleBody.appendChild(row);

            generatedPlanText += `[Day ${i + 1}] (${displayType}) ${displayTask}\n`;
        }

        document.getElementById('result-section').style.display = 'block';
        updateProgress();
    }

    function updateProgress() {
        const checkboxes = document.querySelectorAll('#schedule-body input[type="checkbox"]');
        if (checkboxes.length === 0) return;

        let checkedCount = 0;
        checkboxes.forEach((cb, index) => {
            const textCell = document.getElementById(`text-${index}`);
            if (cb.checked) {
                checkedCount++;
                textCell.classList.add('completed-text');
            } else {
                textCell.classList.remove('completed-text');
            }
        });

        const percentage = Math.round((checkedCount / checkboxes.length) * 100);
        document.getElementById('progress-val').innerText = `${checkedCount} / ${checkboxes.length} (${percentage}%)`;
        document.getElementById('progress-bar').style.width = `${percentage}%`;
    }

    function exportScheduleTxt() {
        if (!generatedPlanText) {
            alert("Please generate the roadmap first before exporting!");
            return;
        }
        const blob = new Blob([generatedPlanText], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "My_Custom_Study_Plan.txt";
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
