<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy AI - Granular Learning Scheduler</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --text-color: #333333;
            --accent-color: #2ecc71;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }

        h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
            margin-top: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            background-color: var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .dashboard-item {
            text-align: center;
            flex: 1;
        }

        .dashboard-item .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .progress-bar-container {
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: var(--secondary-color);
            color: var(--text-color);
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .checkbox-cell {
            text-align: center;
            width: 50px;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
        }

        .completed-text {
            text-decoration: line-through;
            color: #888888;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            margin-right: 5px;
        }
        .badge-concept { background-color: #e67e22; }
        .badge-practice { background-color: #9b59b6; }
        .badge-review { background-color: #16a085; }
    </style>
</head>
<body>

<div class="container">
    <h1>SmartStudy AI Planner</h1>
    
    <div id="planner-form">
        <div class="form-group">
            <label for="exam-name">Target Exam Name</label>
            <input type="text" id="exam-name" placeholder="e.g., AP Computer Science A" value="AP Computer Science A">
        </div>
        
        <div class="form-group">
            <label for="exam-date">Exam Date</label>
            <input type="date" id="exam-date" value="2026-11-06">
        </div>
        
        <div class="form-group">
            <label for="weak-topics">Topics Needing Focus (Separate by comma)</label>
            <input type="text" id="weak-topics" placeholder="e.g., ArrayList, Recursion, 2D Arrays" value="ArrayList, Recursion">
        </div>
        
        <div class="form-group">
            <label for="study-hours">Daily Available Study Time (Hours)</label>
            <input type="number" id="study-hours" min="1" max="24" value="2">
        </div>
        
        <button type="button" onclick="generateDetailedPlan()">Generate AI Granular Plan</button>
    </div>

    <div id="result-section" class="result-section">
        <h2>Your Detailed Learning Dashboard</h2>
        
        <div class="dashboard">
            <div class="dashboard-item">
                <div>Time Remaining</div>
                <div id="d-day-val" class="value">D-00</div>
            </div>
            <div class="dashboard-item">
                <div>Tasks Completed</div>
                <div id="progress-val" class="value">0%</div>
            </div>
        </div>

        <label>Overall Progress</label>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <h2>Granular Study Schedule (AI Optimized Micro-tasks)</h2>
        <table id="schedule-table">
            <thead>
                <tr>
                    <th class="checkbox-cell">Done</th>
                    <th style="width: 150px;">Timeline</th>
                    <th>Detailed Task Breakdown</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    function generateDetailedPlan() {
        const examDateInput = document.getElementById('exam-date').value;
        if (!examDateInput) {
            alert('Please select an exam date!');
            return;
        }

        // 1. D-Day 계산 로직
        const today = new Date();
        const examDate = new Date(examDateInput);
        const timeDiff = examDate.getTime() - today.getTime();
        const dDay = Math.ceil(timeDiff / (1000 * 3600 * 24));
        
        document.getElementById('d-day-val').innerText = dDay > 0 ? `D-${dDay}` : (dDay === 0 ? "D-Day" : `Passed`);

        // 2. 입력된 취약 단원을 배열(Array)로 분리 처리 (String.split 활용 알고리즘)
        const weakTopicsInput = document.getElementById('weak-topics').value || "Core Logic";
        const topicsArray = weakTopicsInput.split(',').map(item => item.trim());
        const hours = document.getElementById('study-hours').value || "2";
        
        const scheduleBody = document.getElementById('schedule-body');
        scheduleBody.innerHTML = ""; // 이전 데이터 초기화

        let globalIndex = 0;

        // 3. 각 취약 단원별로 '구체적인 4단계 세부 계획'을 동적 생성하는 반복문 알고리즘
        topicsArray.forEach((topic, tIdx) => {
            const steps = [
                { 
                    phase: `Phase 1 (Day ${tIdx * 4 + 1})`, 
                    type: '<span class="badge badge-concept">Concept</span>',
                    task: `Review core syntax and memory structures for <strong>[${topic}]</strong>. Study class/method design limitations for ${hours} hours.` 
                },
                { 
                    phase: `Phase 2 (Day ${tIdx * 4 + 2})`, 
                    type: '<span class="badge badge-practice">Practice</span>',
                    task: `Solve 15 Multiple Choice Questions (MCQs) focusing on <strong>[${topic}]</strong> trace logic and edge cases.` 
                },
                { 
                    phase: `Phase 3 (Day ${tIdx * 4 + 3})`, 
                    type: '<span class="badge badge-practice">FRQ Coding</span>',
                    task: `Write out a full Free Response Question (FRQ) solution involving <strong>[${topic}]</strong> on paper, then test logic behaviors.` 
                },
                { 
                    phase: `Phase 4 (Day ${tIdx * 4 + 4})`, 
                    type: '<span class="badge badge-review">Review</span>',
                    task: `Build a personalized error log for <strong>[${topic}]</strong>. Document runtime errors or logic bugs found during coding.` 
                }
            ];

            // 생성된 세부 계획을 테이블 행(Row)으로 추가
            steps.forEach(step => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="checkbox-cell"><input type="checkbox" onchange="updateProgress()" id="check-${globalIndex}"></td>
                    <td><strong>${step.phase}</strong></td>
                    <td id="text-${globalIndex}">${step.type} ${step.task}</td>
                `;
                scheduleBody.appendChild(row);
                globalIndex++;
            });
        });

        // 4. 시험 직전 파이널 세부 계획 추가
        const finalSteps = [
            { phase: "Exam D-3", type: '<span class="badge badge-review">Mock Exam</span>', task: "Take a full-length timed diagnostic mock exam covering all units." },
            { phase: "Exam D-1", type: '<span class="badge badge-review">Final Check</span>', task: `Quick review of the generated error logs. Double check AP Java Quick Reference sheet formulas.` }
        ];

        finalSteps.forEach(step => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="checkbox-cell"><input type="checkbox" onchange="updateProgress()" id="check-${globalIndex}"></td>
                <td><span style="color: #e74c3c;"><strong>${step.phase}</strong></span></td>
                <td id="text-${globalIndex}">${step.type} ${step.task}</td>
            `;
            scheduleBody.appendChild(row);
            globalIndex++;
        });

        // 결과 화면 토글 및 프로그레스 바 초기화
        document.getElementById('result-section').style.display = 'block';
        updateProgress();
    }

    // 5. 전체 진행도 실시간 계산 알고리즘
    function updateProgress() {
        const checkboxes = document.querySelectorAll('#schedule-body input[type="checkbox"]');
        if (checkboxes.length === 0) return;

        let checkedCount = 0;
        checkboxes.forEach((cb, index) => {
            const textCell = document.getElementById(`text-${index}`);
            if (cb.checked) {
                checkedCount++;
                textCell.classList.add('completed-text');
            } else {
                textCell.classList.remove('completed-text');
            }
        });

        const percentage = Math.round((checkedCount / checkboxes.length) * 100);
        
        document.getElementById('progress-val').innerText = `${checkedCount} / ${checkboxes.length} (${percentage}%)`;
        document.getElementById('progress-bar').style.width = `${percentage}%`;
    }
</script>

</body>
</html>
